<!DOCTYPE html>
<html>
<head>
<title>Bundt Cake Orders</title>

<style>
body{
font-family:Arial;
background:#fff7f2;
text-align:center;
}

form{
background:white;
padding:20px;
max-width:400px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
width:60px;
margin:4px;
}

.flavor{
display:flex;
justify-content:space-between;
margin:5px 0;
}

button{
margin-top:15px;
padding:10px;
background:#ff6b6b;
color:white;
border:none;
width:100%;
cursor:pointer;
}

</style>
</head>

<body>

<h2>Bundt Cake Order Form</h2>
<p>$8 per Bundt Cake</p>

<form>

<input type="text" placeholder="Name" required><br><br>
<input type="email" placeholder="Email" required><br><br>

<h3>Select Quantities</h3>

<div class="flavor">Red Velvet <input type="number" min="0" value="0"></div>
<div class="flavor">Confetti <input type="number" min="0" value="0"></div>
<div class="flavor">Lemon <input type="number" min="0" value="0"></div>
<div class="flavor">Chocolate <input type="number" min="0" value="0"></div>
<div class="flavor">Chocolate Chip <input type="number" min="0" value="0"></div>
<div class="flavor">White Chocolate Raspberry <input type="number" min="0" value="0"></div>
<div class="flavor">Classic <input type="number" min="0" value="0"></div>
<div class="flavor">Vanilla <input type="number" min="0" value="0"></div>
<div class="flavor">Strawberries & Cream <input type="number" min="0" value="0"></div>
<div class="flavor">Carrot <input type="number" min="0" value="0"></div>
<div class="flavor">Oreo / Cookies & Cream <input type="number" min="0" value="0"></div>
<div class="flavor">Gluten-Free Chocolate Chip Cookie <input type="number" min="0" value="0"></div>
<div class="flavor">Gluten-Free Lemon Raspberry <input type="number" min="0" value="0"></div>

<p id="total">$0</p>

<button type="button" onclick="pay()">Submit Order & Pay</button>

</form>

<script>

const price = 8;

const inputs = document.querySelectorAll("input[type=number]");
const totalText = document.getElementById("total");

function calculateTotal(){

let total = 0;

inputs.forEach(input=>{
total += input.value * price;
});

totalText.innerText = "Total: $" + total;

}

inputs.forEach(input=>{
input.addEventListener("input",calculateTotal);
});

function pay(){

window.location.href="https://cash.app/$56Treasury?qr=1";

}

</script>

</body>
</html>
